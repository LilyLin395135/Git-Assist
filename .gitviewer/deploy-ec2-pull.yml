name: Deploy to EC2 on git push
'on':
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create or navigate to git-assist directory
        run: |
          if [ ! -d "~/git-assist" ]; then
            mkdir ~/git-assist
          fi
          cd ~/git-assist

      - name: Git pull the latest code
        run: |
          cd ~/git-assist
          git init
          git remote add origin <repository_url>
          git fetch --all
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          cd ~/git-assist
          npm install

      - name: Start the server with pm2
        run: |
          cd ~/git-assist
          pm2 start server.js --name git-assist
